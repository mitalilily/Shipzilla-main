name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-vps.yml"
      - "Dolphin-main-main/**"
      - "render.yaml"
  workflow_dispatch:

concurrency:
  group: vps-deploy-main
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_SOURCE_DIR: Dolphin-main-main

jobs:
  deploy:
    name: Upload source and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment inputs
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          test -n "$VPS_HOST" || {
            echo "Missing required repository secret: VPS_HOST"
            exit 1
          }

          if [ -z "${VPS_PASSWORD:-}" ] && [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "Set either VPS_PASSWORD or VPS_SSH_KEY in repository secrets."
            exit 1
          fi

          test -f "$APP_SOURCE_DIR/deploy/vps-deploy.sh" || {
            echo "Missing deploy script: $APP_SOURCE_DIR/deploy/vps-deploy.sh"
            exit 1
          }

      - name: Package source
        run: |
          set -euo pipefail

          tar -C "$APP_SOURCE_DIR" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='**/node_modules' \
            --exclude='**/dist' \
            --exclude='**/build' \
            --exclude='**/*.log' \
            --exclude='apps/backend/uploads' \
            -czf "$RUNNER_TEMP/shipzilla-source.tgz" .

      - name: Upload and deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          VPS_USER="${VPS_USER:-root}"
          VPS_PORT="${VPS_PORT:-22}"

          ssh_args=(-p "$VPS_PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          scp_args=(-P "$VPS_PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)

          if [ -n "${VPS_SSH_KEY:-}" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/shipzilla_deploy_key
            chmod 600 ~/.ssh/shipzilla_deploy_key
            ssh_base=(ssh -i ~/.ssh/shipzilla_deploy_key "${ssh_args[@]}")
            scp_base=(scp -i ~/.ssh/shipzilla_deploy_key "${scp_args[@]}")
          else
            sudo apt-get update
            sudo apt-get install -y sshpass
            export SSHPASS="$VPS_PASSWORD"
            ssh_base=(sshpass -e ssh "${ssh_args[@]}")
            scp_base=(sshpass -e scp "${scp_args[@]}")
          fi

          "${ssh_base[@]}" "$VPS_USER@$VPS_HOST" "mkdir -p /tmp/shipzilla-deploy"
          "${scp_base[@]}" "$RUNNER_TEMP/shipzilla-source.tgz" "$VPS_USER@$VPS_HOST:/tmp/shipzilla-deploy/shipzilla-source.tgz"
          "${ssh_base[@]}" "$VPS_USER@$VPS_HOST" 'bash -s' <<'REMOTE'
          set -Eeuo pipefail

          APP_DIR="/var/www/shipzilla/source"
          test "$APP_DIR" = "/var/www/shipzilla/source"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR"
          tar -xzf /tmp/shipzilla-deploy/shipzilla-source.tgz -C "$APP_DIR"
          cd "$APP_DIR"
          bash deploy/vps-deploy.sh
          REMOTE
