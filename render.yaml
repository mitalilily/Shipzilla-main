services:
  - type: web
    name: shipzilla-backend
    runtime: node
    rootDir: Dolphin-main-main/apps/backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        value: https://shipzilla-backend.onrender.com
      - key: FRONTEND_URL
        value: https://shipzilla-main.onrender.com
      - key: CORS_ORIGINS
        value: https://shipzilla-main.onrender.com,https://shipzilla-admin.onrender.com
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRY
        value: 30m
      - key: REFRESH_TOKEN_EXPIRY
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GOOGLE_SMTP_USER
        sync: false
      - key: GOOGLE_SMTP_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILLIO_SENDGRID_API_KEY
        sync: false
      - key: RAZORPAY_MODE
        value: test
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: DEV_BUCKET
        sync: false
      - key: STAGING_BUCKET
        sync: false

  - type: web
    name: shipzilla-main
    runtime: static
    rootDir: Dolphin-main-main/apps/client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://shipzilla-backend.onrender.com/api
      - key: VITE_APP_SOCKET_URL
        value: https://shipzilla-backend.onrender.com
      - key: VITE_UI_ONLY_AUTH
        value: "false"

  - type: web
    name: shipzilla-admin
    runtime: static
    rootDir: Dolphin-main-main/apps/admin
    buildCommand: npm install --legacy-peer-deps && npm run build:netlify
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://shipzilla-backend.onrender.com/api
      - key: REACT_APP_SOCKET_URL
        value: https://shipzilla-backend.onrender.com

  - type: web
    name: shipzilla-landing
    runtime: static
    rootDir: Dolphin-main-main/apps/landing
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://shipzilla-backend.onrender.com/api
      - key: VITE_CLIENT_APP_URL
        value: https://shipzilla-main.onrender.com

databases:
  - name: shipzilla-postgres
    databaseName: shipzilla
